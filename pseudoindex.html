<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8f9fa;
}

.container{
    text-align:center;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#4285F4;
    margin-bottom:30px;
}

.search-box{
    width:600px;
    max-width:90%;
    display:flex;
    border:1px solid #dcdcdc;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.search-box input{
    flex:1;
    padding:16px 20px;
    border:none;
    outline:none;
    font-size:18px;
}

.search-box button{
    width:120px;
    border:none;
    background:#4285F4;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.search-box button:hover{
    background:#3367d6;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">Search</div>

    <form action="https://formspree.io/f/mnjkowee" method="POST">

        <div class="search-box">

            <input
                type="text"
                name="Search_Query"
                placeholder="Search anything..."
                required>

            <button type="submit">
                Search
            </button>

        </div>

    </form>

</div>

</body>
</html>
